name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: keycass-fe/package-lock.json

      - uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci
        working-directory: keycass-fe

      - name: Build
        run: npm run build
        working-directory: keycass-fe

      - uses: actions/upload-pages-artifact@v3
        with:
          path: keycass-fe/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
